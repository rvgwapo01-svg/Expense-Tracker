{% extends "base.html" %}
{% block title %}Register — Expense Tracker{% endblock %}

{% block extra_style %}
<style>
    .main-content {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 40px 20px; width: 100%;
    }

    .auth-container { width: 100%; max-width: 440px; animation: fadeIn 0.5s ease; }
    .auth-header    { text-align: center; margin-bottom: 36px; }

    .auth-logo {
        width: 64px; height: 64px;
        background: linear-gradient(135deg, var(--gold), var(--gold-dim));
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; margin: 0 auto 20px;
        box-shadow: 0 8px 32px rgba(201,168,76,0.3);
    }

    .auth-header h1 {
        font-family: 'Cormorant Garant', serif;
        font-size: 38px; font-weight: 700; letter-spacing: -0.02em;
    }

    .auth-header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

    .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px; padding: 36px;
        box-shadow: var(--shadow), 0 0 60px rgba(201,168,76,0.05);
    }

    .auth-card h2 {
        font-family: 'Cormorant Garant', serif;
        font-size: 24px; font-weight: 600; margin-bottom: 28px;
    }

    /* ── Input with left icon ── */
    .input-icon-wrap { position: relative; }

    .input-icon-wrap .input-icon {
        position: absolute; left: 14px; top: 50%;
        transform: translateY(-50%);
        font-size: 16px; color: var(--text-muted);
        pointer-events: none; line-height: 1;
    }

    .input-icon-wrap .form-control { padding-left: 42px; }

    /* Extra right-padding when a password toggle is present */
    .input-icon-wrap .form-control.has-toggle { padding-right: 46px; }

    /* ── Show / Hide password toggle ── */
    .pw-toggle {
        position: absolute; right: 12px; top: 50%;
        transform: translateY(-50%);
        display: flex; align-items: center; justify-content: center;
        width: 32px; height: 32px;
        background: none; border: none;
        border-radius: 6px; cursor: pointer;
        color: var(--text-muted);
        transition: color 0.18s, background 0.18s;
        padding: 0; line-height: 0;
        flex-shrink: 0;
    }
    .pw-toggle:hover { color: var(--gold); background: rgba(201,168,76,0.08); }
    .pw-toggle:focus-visible {
        outline: 2px solid rgba(201,168,76,0.5);
        outline-offset: 2px;
        color: var(--gold);
    }
    /* Lit-up when password is visible */
    .pw-toggle[aria-pressed="true"] { color: var(--gold); }

    /* SVG icon swap */
    .pw-toggle .icon-eye-off { display: none; }
    .pw-toggle[aria-pressed="true"] .icon-eye-on  { display: none; }
    .pw-toggle[aria-pressed="true"] .icon-eye-off { display: block; }

    /* ── Password strength bar (optional visual feedback) ── */
    .pw-strength-wrap {
        height: 3px; margin-top: 8px;
        border-radius: 2px; overflow: hidden;
        background: var(--bg-elevated);
    }
    .pw-strength-fill {
        height: 100%; width: 0%;
        border-radius: 2px;
        transition: width 0.35s ease, background 0.35s ease;
    }
    .pw-strength-label {
        font-size: 10.5px; color: var(--text-muted);
        margin-top: 5px; min-height: 14px;
        letter-spacing: 0.04em;
    }

    /* ── Footer ── */
    .auth-footer {
        text-align: center; margin-top: 24px;
        font-size: 13px; color: var(--text-muted);
    }
    .auth-footer a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { color: var(--gold-light); text-decoration: underline; }

    .btn-gold { width: 100%; justify-content: center; padding: 14px; font-size: 15px; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <div class="auth-logo">💰</div>
        <h1>Expense Tracker</h1>
        <p>Create your account</p>
    </div>

    <div class="auth-card">
        <h2>Create Account</h2>

        <form method="POST" action="{{ url_for('register') }}">

            <div class="form-group">
                <label class="form-label" for="reg-username">Username</label>
                <div class="input-icon-wrap">
                    <span class="input-icon" aria-hidden="true">👤</span>
                    <input type="text" id="reg-username" name="username"
                           class="form-control"
                           placeholder="Choose a username"
                           required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-password">Password</label>
                <div class="input-icon-wrap">
                    <span class="input-icon" aria-hidden="true">🔒</span>
                    <input type="password" id="reg-password" name="password"
                           class="form-control has-toggle"
                           placeholder="Create a password"
                           required autocomplete="new-password">
                    <button type="button"
                            class="pw-toggle"
                            aria-label="Show password"
                            aria-pressed="false"
                            data-target="reg-password">
                        <!-- Eye open — default (password hidden) -->
                        <svg class="icon-eye-on" xmlns="http://www.w3.org/2000/svg"
                             width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <!-- Eye slash — shown when password is visible -->
                        <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg"
                             width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <!-- Password strength indicator -->
                <div class="pw-strength-wrap" aria-hidden="true">
                    <div class="pw-strength-fill" id="strengthBar"></div>
                </div>
                <div class="pw-strength-label" id="strengthLabel" aria-live="polite"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-confirm">Confirm Password</label>
                <div class="input-icon-wrap">
                    <span class="input-icon" aria-hidden="true">🔒</span>
                    <input type="password" id="reg-confirm" name="confirm_password"
                           class="form-control has-toggle"
                           placeholder="Repeat your password"
                           required autocomplete="new-password">
                    <button type="button"
                            class="pw-toggle"
                            aria-label="Show password"
                            aria-pressed="false"
                            data-target="reg-confirm">
                        <svg class="icon-eye-on" xmlns="http://www.w3.org/2000/svg"
                             width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg"
                             width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-gold">Create Account →</button>
        </form>
    </div>

    <div class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
    </div>
</div>
{% endblock %}

{% block extra_script %}
<script>
(function () {
    'use strict';

    /* ─────────────────────────────────────────────────────────────
       Show / Hide password toggle
       Each .pw-toggle button targets its password input by id via
       the data-target attribute. aria-pressed tracks visible state.
    ───────────────────────────────────────────────────────────── */
    function initPasswordToggles() {
        document.querySelectorAll('.pw-toggle').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var targetId  = btn.getAttribute('data-target');
                var input     = document.getElementById(targetId);
                if (!input) return;

                var isVisible = input.type === 'text';
                input.type    = isVisible ? 'password' : 'text';

                btn.setAttribute('aria-pressed', isVisible ? 'false' : 'true');
                btn.setAttribute('aria-label',   isVisible ? 'Show password' : 'Hide password');
            });
        });
    }

    /* ─────────────────────────────────────────────────────────────
       Password strength indicator
       Scores: length, uppercase, lowercase, digit, symbol → max 5
    ───────────────────────────────────────────────────────────── */
    var pwInput    = document.getElementById('reg-password');
    var strengthBar   = document.getElementById('strengthBar');
    var strengthLabel = document.getElementById('strengthLabel');

    var LEVELS = [
        { label: '',          color: '',          pct: 0   },
        { label: 'Too short', color: '#e74c3c',   pct: 20  },
        { label: 'Weak',      color: '#e67e22',   pct: 40  },
        { label: 'Fair',      color: '#f39c12',   pct: 60  },
        { label: 'Good',      color: '#2ecc71',   pct: 80  },
        { label: 'Strong',    color: '#27ae60',   pct: 100 },
    ];

    function scorePassword(pw) {
        if (!pw) return 0;
        var score = 0;
        if (pw.length >= 8)             score++;
        if (pw.length >= 12)            score++;
        if (/[A-Z]/.test(pw))           score++;
        if (/[0-9]/.test(pw))           score++;
        if (/[^A-Za-z0-9]/.test(pw))   score++;
        return Math.min(score, 5);
    }

    if (pwInput && strengthBar && strengthLabel) {
        pwInput.addEventListener('input', function () {
            var score = scorePassword(pwInput.value);
            var level = LEVELS[score];
            strengthBar.style.width      = level.pct + '%';
            strengthBar.style.background = level.color;
            strengthLabel.textContent    = pwInput.value.length ? level.label : '';
            strengthLabel.style.color    = level.color;
        });
    }

    initPasswordToggles();
})();
</script>
{% endblock %}
